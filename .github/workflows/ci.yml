on:
  pull_request:
  merge_group:
  push:
    branches: [master]
jobs:
  lint:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
      - run: nix run --inputs-from . nixpkgs#zizmor -- .
      - run: nix run --inputs-from . nixpkgs#actionlint
  nix-diff:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    # on pull requests: HEAD^ is the base commit of the pull request
    # on merge queue: HEAD^ is the item ahead of us in the queue
    # on master: HEAD^ is the previous commit
    steps:
      - name: checkout head 
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2
          path: head
          persist-credentials: false
      - name: determine base
        id: base
        working-directory: head
        run: echo "sha=$(git rev-parse HEAD^)" >> "$GITHUB_OUTPUT"
      - name: checkout base
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.base.outputs.sha }}
          path: base
          persist-credentials: false
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
      - name: nix build base
        run: nix --quiet --print-build-logs build ./base#nixosConfigurations.altra.config.system.build.toplevel --out-link ./base-result
      - name: nix build head
        run: nix --quiet --print-build-logs build ./head#nixosConfigurations.altra.config.system.build.toplevel --out-link ./head-result
      - name: nvd diff
        run: nix --quiet run --inputs-from ./head nixpkgs#nvd -- --color=always diff ./base-result ./head-result
      - name: nix-diff
        run: nix --quiet run --inputs-from ./head nixpkgs#nix-diff -- --color=always ./base-result ./head-result
  submit-dependencies:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        host: [altra]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # On pull_request, the default checkout is the merge commit; check out the PR head instead
          # so the snapshot describes the same commit Dependency Review compares against the base.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
      - name: build toplevel
        env:
          HOST: ${{ matrix.host }}
        run: nix --quiet --print-build-logs build ".#nixosConfigurations.$HOST.config.system.build.toplevel" --out-link ./result
      - name: build snapshot
        env:
          HOST: ${{ matrix.host }}
          # Override the runner-provided values so the snapshot attaches to the PR head, not the merge commit / refs/pull/N/merge.
          GITHUB_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          GITHUB_REF: ${{ github.event.pull_request.head.ref && format('refs/heads/{0}', github.event.pull_request.head.ref) || github.ref }}
        run: ./.github/scripts/nix-deps-snapshot.sh "$HOST" ./result > snapshot.json
      - name: submit snapshot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/$GH_REPO/dependency-graph/snapshots" \
            --input snapshot.json
