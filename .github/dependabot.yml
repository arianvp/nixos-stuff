version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
  - package-ecosystem: nix
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 1 # zizmor: ignore[dependabot-cooldown] nixpkgs release branches are gated by Hydra channel advancement, providing natural cooldown
